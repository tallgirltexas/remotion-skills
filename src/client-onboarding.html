<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Onboarding · Karen Lewis Creative</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0D0D1A;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0D0D1A; }
    ::-webkit-scrollbar-thumb { background: #2A2A40; border-radius: 3px; }

    .app {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 24px 100px;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      text-align: center;
      padding: 64px 0 48px;
    }
    .header-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--phase-color);
      margin-bottom: 20px;
    }
    .header-eyebrow::before,
    .header-eyebrow::after {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--phase-color);
      opacity: 0.5;
    }
    .header h1 {
      font-size: 42px;
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    .header p {
      font-size: 16px;
      line-height: 1.7;
      color: #9090A8;
      max-width: 460px;
      margin: 0 auto;
    }

    /* ── Tab nav ─────────────────────────────── */
    .tab-nav {
      display: flex;
      gap: 4px;
      margin-bottom: 36px;
      border-bottom: 1px solid #1E1E35;
      padding-bottom: 0;
    }
    .tab-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 14px 18px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      cursor: pointer;
      color: #5A5A78;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.18s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: #9090A8; }
    .tab-btn.active { color: #fff; }
    .tab-num {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      opacity: 0.5;
    }
    .tab-btn.active .tab-num { opacity: 1; color: var(--phase-color); }
    .tab-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0;
      transition: opacity 0.18s;
      flex-shrink: 0;
    }
    .tab-btn.active .tab-dot {
      opacity: 1;
      background: var(--phase-color);
    }

    /* ── Cards ───────────────────────────────── */
    .card {
      background: #111122;
      border: 1px solid #1E1E35;
      border-radius: 20px;
      padding: 36px;
      margin-bottom: 20px;
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 36px;
    }
    .card-icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: color-mix(in srgb, var(--phase-color) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--phase-color) 25%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--phase-color);
      font-size: 19px;
    }
    .card-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .card-sub {
      font-size: 13px;
      color: #6A6A88;
      line-height: 1.5;
    }

    /* ── Process steps ───────────────────────── */
    .steps {
      display: flex;
      flex-direction: column;
    }
    .step {
      display: flex;
      gap: 18px;
    }
    .step-spine {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      width: 36px;
    }
    .step-num {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--phase-color) 14%, transparent);
      border: 1.5px solid color-mix(in srgb, var(--phase-color) 35%, transparent);
      color: var(--phase-color);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step-connector {
      width: 1.5px;
      flex: 1;
      background: #1E1E35;
      margin: 6px 0;
    }
    .step-body {
      padding: 6px 0 28px;
    }
    .step:last-child .step-body { padding-bottom: 0; }
    .step:last-child .step-connector { display: none; }
    .step-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .step-desc {
      font-size: 14px;
      color: #6A6A88;
      line-height: 1.55;
    }

    /* ── Form fields ─────────────────────────── */
    .form-fields {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .field-label {
      font-size: 13px;
      font-weight: 500;
      color: #B0B0C8;
      letter-spacing: 0.01em;
    }
    .field-label.req::after {
      content: ' *';
      color: var(--phase-color);
    }
    .field-input,
    .field-textarea {
      background: #0A0A16;
      border: 1px solid #1E1E35;
      border-radius: 10px;
      padding: 12px 15px;
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.55;
      outline: none;
      width: 100%;
      transition: border-color 0.18s;
    }
    .field-input:focus,
    .field-textarea:focus {
      border-color: color-mix(in srgb, var(--phase-color) 55%, transparent);
    }
    .field-input::placeholder,
    .field-textarea::placeholder { color: #32324A; }
    .field-textarea {
      resize: vertical;
      min-height: 96px;
    }
    .field-textarea.tall { min-height: 136px; }

    /* ── Radio options ────────────────────────── */
    .radio-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .radio-opt {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 11px 15px;
      background: #0A0A16;
      border: 1px solid #1E1E35;
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.18s;
      user-select: none;
    }
    .radio-opt:hover { border-color: #2A2A48; }
    .radio-opt.selected {
      border-color: color-mix(in srgb, var(--phase-color) 50%, transparent);
      background: color-mix(in srgb, var(--phase-color) 5%, #0A0A16);
    }
    .radio-ring {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #2A2A48;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.18s;
    }
    .radio-opt.selected .radio-ring {
      border-color: var(--phase-color);
    }
    .radio-fill {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--phase-color);
    }
    .radio-text {
      font-size: 14px;
      color: #A0A0BE;
    }
    .radio-opt.selected .radio-text { color: #fff; }

    /* ── Divider + section label ─────────────── */
    .field-divider {
      border: none;
      border-top: 1px solid #1E1E35;
    }
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #4A4A68;
      margin-top: 6px;
    }

    /* ── Note box ────────────────────────────── */
    .note-box {
      background: color-mix(in srgb, var(--phase-color) 7%, transparent);
      border: 1px solid color-mix(in srgb, var(--phase-color) 22%, transparent);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13px;
      color: #8A8AAA;
      line-height: 1.6;
    }
    .note-box strong { color: var(--phase-color); font-weight: 600; }

    /* ── Submit area ─────────────────────────── */
    .submit-area {
      text-align: center;
      padding: 44px 0 0;
    }
    .submit-status {
      font-size: 13px;
      color: #5A5A78;
      margin-bottom: 22px;
      letter-spacing: 0.01em;
    }
    .submit-status.ready { color: color-mix(in srgb, var(--phase-color) 80%, #fff); }
    .submit-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 17px 44px;
      background: var(--phase-color);
      color: #0D0D1A;
      border: none;
      border-radius: 100px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.18s, transform 0.15s;
    }
    .submit-btn:hover { opacity: 0.88; transform: translateY(-2px); }
    .submit-btn:active { transform: translateY(0); opacity: 1; }
    .submit-hint {
      font-size: 12px;
      color: #3A3A58;
      margin-top: 16px;
      line-height: 1.6;
    }
    .submit-hint a {
      color: #5A5A88;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── Responsive ──────────────────────────── */
    @media (max-width: 600px) {
      .app { padding: 0 16px 80px; }
      .header { padding: 48px 0 36px; }
      .header h1 { font-size: 32px; }
      .card { padding: 24px; }
      .tab-btn { padding: 12px 12px; font-size: 13px; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const TABS = [
  { id: 'branding',    label: 'Branding',    color: '#C8A97E', num: '01' },
  { id: 'design',      label: 'Design',      color: '#8A7CA8', num: '02' },
  { id: 'development', label: 'Development', color: '#6BA5A0', num: '03' },
];

const PROCESS = {
  branding: [
    { title: 'Discovery Call',             desc: 'We connect to learn about your business, goals, and long-term vision.' },
    { title: 'Brand Strategy Workbook',    desc: 'You complete our workbook to define your positioning, messaging, and audience.' },
    { title: 'Brand Identity Design',      desc: 'We craft your logo, color palette, typography, and brand voice guidelines.' },
    { title: 'Brand Guidelines Delivery',  desc: 'You receive a comprehensive guide to keep your brand consistent everywhere.' },
  ],
  design: [
    { title: 'Project Kickoff Meeting',    desc: 'We align on scope, timeline, and review your completed Project Planner together.' },
    { title: 'Project Planner Review',     desc: 'Your detailed questionnaire becomes the blueprint for every design decision.' },
    { title: 'Design Review Meetings',     desc: 'Three dedicated sessions to refine and approve every element of your site.' },
    { title: 'Final Approval & Go-Live',   desc: 'You give the green light and we officially launch your new website.' },
  ],
  development: [
    { title: 'Functionality Review',       desc: 'We map out every feature, integration, and automation your site needs.' },
    { title: 'Website Development',        desc: 'Your site is built, all integrations connected, and functionality tested.' },
    { title: 'Quality Assurance',          desc: 'Thorough cross-device and cross-browser testing before anything goes public.' },
    { title: 'Go Live & Handoff Call',     desc: 'We launch your site and walk you through managing and updating it going forward.' },
  ],
};

const FIELDS = {
  branding: [
    { id: 'businessName',      label: 'Business name',                                                      type: 'input',    req: true },
    { id: 'tagline',           label: 'Business tagline',                                                    type: 'input' },
    { id: 'oneLiner',          label: 'Describe your business in one sentence',                              type: 'textarea' },
    { id: 'mission',           label: 'Mission statement — why does your business exist?',                   type: 'textarea' },
    { id: 'coreValues',        label: 'Core values (e.g. integrity, creativity, community)',                 type: 'textarea' },
    { id: 'idealClient',       label: 'Describe your ideal client in detail — age, lifestyle, challenges, desires', type: 'textarea', tall: true },
    { id: 'personality',       label: 'Three words that describe your brand personality',                    type: 'input',    ph: 'e.g. bold, warm, sophisticated' },
    { id: 'voice',             label: 'Brand voice — how should your brand sound?',                         type: 'input',    ph: 'e.g. friendly, authoritative, conversational' },
    { id: 'inspiration',       label: '3–5 brands whose visual style inspires you, and what you love about each', type: 'textarea', tall: true },
    { id: 'colorsLove',        label: 'Colors, fonts, or design elements you love',                         type: 'textarea' },
    { id: 'colorsHate',        label: 'Colors, fonts, or styles you absolutely do NOT want',                type: 'textarea' },
  ],
  design: [
    {
      id: 'situation',
      label: 'What best describes your current situation?',
      type: 'radio',
      req: true,
      options: [
        'I have no website — starting from scratch',
        'I have a WordPress site that needs a redesign',
        'I have a Wix / Weebly / Squarespace site to migrate to WordPress',
        'Other',
      ],
    },
    { id: 'shortGoals',        label: 'Short-term business goals (3–6 months)',                             type: 'textarea' },
    { id: 'longGoals',         label: 'Long-term business goals (3–5 years)',                               type: 'textarea' },
    { id: 'dreamSite',         label: 'Describe your dream website — what it looks like, what it does, what it automates for you', type: 'textarea', tall: true },
    { id: 'sitesLove',         label: 'Links to 3 websites closest to your vision (mix and match is great)', type: 'textarea', ph: 'https://\nhttps://\nhttps://' },
    { id: 'designStyle',       label: 'Design style you love (e.g. rustic, minimalist, illustrative, photo-heavy, colorful)', type: 'input' },
    { id: 'mustHave',          label: 'Anything you definitely WANT on the site (sections, features, colors, fonts)', type: 'textarea' },
    { id: 'mustNotHave',       label: 'Anything you definitely do NOT want on the site',                   type: 'textarea' },
    { id: '_div1',             type: 'divider', label: 'Social Media Profiles' },
    { id: 'facebook',          label: 'Facebook Page / Group',                                              type: 'input',    ph: 'https://facebook.com/...' },
    { id: 'instagram',         label: 'Instagram',                                                          type: 'input',    ph: 'https://instagram.com/...' },
    { id: 'linkedin',          label: 'LinkedIn',                                                           type: 'input',    ph: 'https://linkedin.com/...' },
    { id: 'youtube',           label: 'YouTube',                                                            type: 'input',    ph: 'https://youtube.com/...' },
    { id: 'otherSocial',       label: 'Other (Twitter / X, TikTok, Podcast, etc.)',                        type: 'input' },
  ],
  development: [
    { id: '_note1', type: 'note', html: '<strong>Note on login credentials:</strong> Usernames and passwords for your domain, hosting, email, and payment accounts will be shared securely through a separate method — please do not include them here.' },
    { id: 'domain',            label: 'Domain name',                                                        type: 'input',    ph: 'https://yourdomain.com' },
    { id: 'hosting',           label: 'Hosting provider',                                                   type: 'input',    ph: 'e.g. SiteGround, Bluehost, WP Engine' },
    { id: 'bizEmail',          label: 'Business email address',                                             type: 'input',    ph: 'hello@yourdomain.com' },
    { id: 'crm',               label: 'Email list provider / CRM',                                          type: 'input',    ph: 'e.g. ConvertKit, MailChimp, ActiveCampaign' },
    { id: 'cart',              label: 'Shopping cart (if applicable)',                                       type: 'input',    ph: 'e.g. ThriveCart, SamCart, WooCommerce' },
    { id: 'payment',           label: 'Payment processor',                                                  type: 'input',    ph: 'e.g. Stripe, PayPal' },
    { id: '_div2',             type: 'divider', label: 'Customer Journey' },
    { id: 'journey',           label: 'Tell the full story of how someone goes from discovering you to becoming a paying client', type: 'textarea', tall: true },
    { id: 'traffic',           label: 'How do you plan to drive traffic to your website?',                  type: 'textarea' },
    { id: 'afterPurchase',     label: 'What happens after a client makes a purchase? Walk me through the entire process.', type: 'textarea' },
    { id: 'refunds',           label: 'Refund policies and purchase terms & conditions',                    type: 'textarea' },
  ],
};

/* ─── Sub-components ─── */

function ProcessSteps({ tab }) {
  return (
    <div className="steps">
      {PROCESS[tab].map((s, i) => (
        <div key={i} className="step">
          <div className="step-spine">
            <div className="step-num">{String(i + 1).padStart(2, '0')}</div>
            <div className="step-connector" />
          </div>
          <div className="step-body">
            <div className="step-title">{s.title}</div>
            <div className="step-desc">{s.desc}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function RadioField({ field, value, onChange }) {
  return (
    <div className="radio-list">
      {field.options.map((opt) => (
        <div
          key={opt}
          className={`radio-opt${value === opt ? ' selected' : ''}`}
          onClick={() => onChange(field.id, opt)}
        >
          <div className="radio-ring">
            {value === opt && <div className="radio-fill" />}
          </div>
          <span className="radio-text">{opt}</span>
        </div>
      ))}
    </div>
  );
}

function FormFields({ tab, data, onChange }) {
  return (
    <div className="form-fields">
      {FIELDS[tab].map((f) => {
        if (f.type === 'note') {
          return <div key={f.id} className="note-box" dangerouslySetInnerHTML={{ __html: f.html }} />;
        }
        if (f.type === 'divider') {
          return (
            <div key={f.id}>
              <hr className="field-divider" />
              <div className="section-label">{f.label}</div>
            </div>
          );
        }
        if (f.type === 'radio') {
          return (
            <div key={f.id} className="field">
              <label className={`field-label${f.req ? ' req' : ''}`}>{f.label}</label>
              <RadioField field={f} value={data[f.id] || ''} onChange={onChange} />
            </div>
          );
        }
        if (f.type === 'textarea') {
          return (
            <div key={f.id} className="field">
              <label className={`field-label${f.req ? ' req' : ''}`}>{f.label}</label>
              <textarea
                className={`field-textarea${f.tall ? ' tall' : ''}`}
                placeholder={f.ph || ''}
                value={data[f.id] || ''}
                onChange={(e) => onChange(f.id, e.target.value)}
              />
            </div>
          );
        }
        return (
          <div key={f.id} className="field">
            <label className={`field-label${f.req ? ' req' : ''}`}>{f.label}</label>
            <input
              type="text"
              className="field-input"
              placeholder={f.ph || ''}
              value={data[f.id] || ''}
              onChange={(e) => onChange(f.id, e.target.value)}
            />
          </div>
        );
      })}
    </div>
  );
}

/* ─── App ─── */

function App() {
  const [tab, setTab] = useState('branding');
  const [data, setData] = useState({});

  const activeTab = TABS.find(t => t.id === tab);
  const color = activeTab.color;

  const handleChange = (id, val) => setData(prev => ({ ...prev, [id]: val }));

  const filledSections = TABS.filter(t =>
    FIELDS[t.id].some(f => f.type !== 'note' && f.type !== 'divider' && (data[f.id] || '').trim())
  ).length;

  const handleSend = () => {
    const biz = (data.businessName || '').trim() || 'New Client';
    const subject = `New Client Onboarding — ${biz}`;

    const sections = [
      { heading: 'BRANDING',    fields: FIELDS.branding },
      { heading: 'DESIGN',      fields: FIELDS.design },
      { heading: 'DEVELOPMENT', fields: FIELDS.development },
    ];

    let body = `CLIENT ONBOARDING SUBMISSION\n${'─'.repeat(36)}\n\n`;

    sections.forEach(({ heading, fields }) => {
      const lines = [];
      fields.forEach(f => {
        if (f.type === 'note' || f.type === 'divider') return;
        const v = (data[f.id] || '').trim();
        if (v) lines.push(`${f.label}:\n${v}`);
      });
      if (lines.length) {
        body += `${heading}\n${'─'.repeat(heading.length)}\n\n${lines.join('\n\n')}\n\n\n`;
      }
    });

    window.location.href =
      `mailto:karen@simplyamusingdesigns.com` +
      `?subject=${encodeURIComponent(subject)}` +
      `&body=${encodeURIComponent(body)}`;
  };

  return (
    <div className="app" style={{ '--phase-color': color }}>

      {/* Header */}
      <header className="header">
        <div className="header-eyebrow">Karen Lewis Creative</div>
        <h1>Client Onboarding</h1>
        <p>
          Please complete each section below. The more detail you share,
          the better I can bring your vision to life.
        </p>
      </header>

      {/* Tab nav */}
      <nav className="tab-nav">
        {TABS.map(t => (
          <button
            key={t.id}
            className={`tab-btn${tab === t.id ? ' active' : ''}`}
            style={tab === t.id ? { color: '#fff', borderBottomColor: t.color } : {}}
            onClick={() => setTab(t.id)}
          >
            <span className="tab-dot" />
            <span className="tab-num">{t.num}</span>
            {t.label}
          </button>
        ))}
      </nav>

      {/* Process card */}
      <div className="card">
        <div className="card-header">
          <div className="card-icon-wrap">◈</div>
          <div>
            <div className="card-title">Our {activeTab.label} Process</div>
            <div className="card-sub">Here's how we work through this phase together</div>
          </div>
        </div>
        <ProcessSteps tab={tab} />
      </div>

      {/* Form card */}
      <div className="card">
        <div className="card-header">
          <div className="card-icon-wrap">✎</div>
          <div>
            <div className="card-title">What We Need From You</div>
            <div className="card-sub">There's no such thing as too much detail — the more you share, the better!</div>
          </div>
        </div>
        <FormFields tab={tab} data={data} onChange={handleChange} />
      </div>

      {/* Submit */}
      <div className="submit-area">
        <p className={`submit-status${filledSections === 3 ? ' ready' : ''}`}>
          {filledSections === 3
            ? '✓ All three sections have responses — ready to send!'
            : `${filledSections} of 3 sections started · You can submit whenever you're ready`}
        </p>
        <button className="submit-btn" onClick={handleSend}>
          Send to Karen
          <span>→</span>
        </button>
        <p className="submit-hint">
          This opens your default email app with everything pre-filled.<br />
          If it doesn't open automatically, email&nbsp;
          <a href="mailto:karen@simplyamusingdesigns.com">karen@simplyamusingdesigns.com</a>&nbsp;directly.
        </p>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
